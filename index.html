<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f0f;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    .container{
      position:relative;
      width:340px;
      height:240px;
      perspective:1200px;
    }

    /* Envelope */

    .envelope{
      position:absolute;
      width:100%;
      height:100%;
      cursor:pointer;
    }

    .back{
      position:absolute;
      width:100%;
      height:100%;
      background:#d9b382;
      border-radius:10px;
      z-index:1;
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .flap{
      position:absolute;
      top:0;
      width:100%;
      height:120px;
      background:#c89b65;
      clip-path:polygon(0 0, 50% 100%, 100% 0);
      transform-origin:top;
      transition:transform 1s ease;
      z-index:3;
    }

    .letter{
      position:absolute;
      left:10px;
      top:20px;
      width:320px;
      height:200px;
      border-radius:12px;
      overflow:hidden;
      transition:transform 1.2s ease;
      z-index:2;
      background:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .letter img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Open Animation */

    .open .flap{
      transform:rotateX(180deg);
    }

    .open .letter{
      transform:translateY(-170px);
    }

    /* Invitation Fullscreen */

    .fullscreen{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      opacity:0;
      visibility:hidden;
      transition:all 1s ease;
      z-index:999;
      padding:20px;
    }

    .fullscreen.show{
      opacity:1;
      visibility:visible;
    }

    .fullscreen img{
      width:100%;
      max-width:450px;
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      animation:zoomIn 1s ease;
    }

    @keyframes zoomIn{
      from{
        transform:scale(0.8);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .tap-text{
      position:absolute;
      bottom:-50px;
      width:100%;
      text-align:center;
      color:white;
      font-size:15px;
      letter-spacing:1px;
      opacity:0.8;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{opacity:0.3;}
      50%{opacity:1;}
      100%{opacity:0.3;}
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="envelope" id="envelope">

      <div class="back"></div>

      <div class="flap"></div>

      <div class="letter">
        <img src="cover.png" alt="Invitation Preview">
      </div>

    </div>

    <div class="tap-text">
      Tap to Open ✨
    </div>

  </div>

  <!-- Full Invitation -->

  <div class="fullscreen" id="fullscreen">
    <img src="invite.png" alt="Invitation">
  </div>

  <script>

    const envelope = document.getElementById("envelope");
    const fullscreen = document.getElementById("fullscreen");

    envelope.addEventListener("click", () => {

      envelope.classList.add("open");

      setTimeout(() => {
        fullscreen.classList.add("show");
      }, 1500);

    });

  </script>

</body>
</html>
